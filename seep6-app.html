function genMathProblem(diff) {
  if (diff <= 2) {
    const t=Math.floor(Math.random()*2);
    if(t===0){const a=10+Math.floor(Math.random()*40),b=10+Math.floor(Math.random()*40);return{text:`${a} + ${b} = ?`,answer:String(a+b),hint:`บวกหลักหน่วยก่อน แล้วค่อยบวกหลักสิบนะ`};}
    const a=30+Math.floor(Math.random()*60),b=5+Math.floor(Math.random()*25);return{text:`มีเงิน ${a} บาท ใช้ไป ${b} บาท เหลือกี่บาท?`,answer:String(a-b),hint:`เอา ${a} ลบด้วย ${b} นะจ๊ะ`};
  }
  if (diff <= 4) {
    const t=Math.floor(Math.random()*3);
    if(t===0){const a=5+Math.floor(Math.random()*10),b=5+Math.floor(Math.random()*15);return{text:`${a} × ${b} = ?`,answer:String(a*b),hint:`คูณทีละขั้น ${a} × ${b}`};}
    if(t===1){const a=50+Math.floor(Math.random()*50),pct=Math.floor(Math.random()*3)*10+10;return{text:`${a} บาท ลด ${pct}% จ่ายกี่บาท?`,answer:String(a-Math.round(a*pct/100)),hint:`ลด ${pct}% คือเอา ${a} × ${pct/100} แล้วลบออก`};}
    const a=100+Math.floor(Math.random()*200),b=10+Math.floor(Math.random()*20);return{text:`${a} ÷ ${b} = ?`,answer:String(Math.round(a/b)),hint:`หารลองทีละตัวเลข`};
  }
  if (diff <= 6) {
    const a=Math.floor(Math.random()*10)-5,b=Math.floor(Math.random()*10)-5;return{text:`(${a}) × (${b}) = ?`,answer:String(a*b),hint:`จำนวนเต็มลบคูณลบได้บวก บวกคูณลบได้ลบ`};
  }
  const a=2+Math.floor(Math.random()*5),b=Math.floor(Math.random()*6)-3,c=Math.floor(Math.random()*6)-3;
  const ans=-b;
  return{text:`x² + ${2*b}x + ${b*b} = 0 (ทายค่า x ที่ทำให้เป็นจริง)`,answer:String(ans),hint:`x² + ${2*b}x + ${b*b} = (x + ${b})² → x = ${ans}`};
}

/* helpers */
function subjectProgress(lessons, scores) {
  const v = lessons.map(l => scores[l.id] || 0);
  return Math.round(v.reduce((a,b)=>a+b,0)/lessons.length);
}
function getReadChat(diff) {
  if(diff<=2) return READ_CHAT_DB.low;
  if(diff<=5) return READ_CHAT_DB.mid;
  return READ_CHAT_DB.high;
}

function App() {
  const [gradeId, setGradeId]   = useState(null);
  const [tab,     setTab]       = useState("home");
  const [dialect, setDialect]   = useState("central");
  const [xp,      setXp]        = useState(0);
  const [completed, setCompleted] = useState([]);
  const [scores,  setScores]    = useState({});
  const [perfectCount, setPerfectCount] = useState(0);
  const [chatCount,    setChatCount]    = useState(0);
  const [gradeChanged, setGradeChanged] = useState(false);
  const [earnedBadges, setEarnedBadges] = useState([]);
  const [toast,   setToast]     = useState(null);

  // Quiz
  const [activeLesson, setActiveLesson] = useState(null);
  const [qIndex,  setQIndex]    = useState(0);
  const [selected,setSelected]  = useState(null);
  const [lessonScore,setLessonScore] = useState(0);
  const [lessonDone, setLessonDone]  = useState(false);
  const [answered,setAnswered]  = useState(false);
  const [passageOpen,setPassageOpen] = useState(false);

  // Chat
  const [messages, setMessages] = useState([{ from:"bot", text:DIALECTS.central.greeting }]);
  const [input,  setInput]  = useState("");
  const [typing, setTyping] = useState(false);
  const [pending,setPending] = useState(null);
  const bottomRef = useRef(null);

  /* derived */
  const grade = useMemo(() => GRADES.find(g => g.id === gradeId), [gradeId]);
  const lessons = useMemo(() => gradeId ? LESSON_DB[gradeId] : null, [gradeId]);
  const readingLessons = lessons ? lessons.reading : [];
  const mathLessons    = lessons ? lessons.math    : [];
  const level     = Math.floor(xp / 100) + 1;
  const xpInLevel = xp % 100;
  const readingProg = subjectProgress(readingLessons, scores);
  const mathProg    = subjectProgress(mathLessons, scores);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:"smooth" }); }, [messages, typing]);

  useEffect(() => {
    if (!gradeId) return;
    const state = { completed, perfectCount, chatCount, xp, gradeChanged };
    const newly = BADGES.filter(b => b.check(state) && !earnedBadges.includes(b.id));
    if (newly.length) {
      setEarnedBadges(e => [...e, ...newly.map(b => b.id)]);
      setToast({ icon:newly[0].icon, text:`ได้เหรียญใหม่: ${newly[0].name}!` });
      setTimeout(() => setToast(null), 3200);
    }
  }, [completed, perfectCount, chatCount, xp, gradeChanged]);

  const handleSelectGrade = useCallback((id) => {
    if (gradeId && id !== gradeId) setGradeChanged(true);
    setGradeId(id);
    setCompleted([]); setScores({}); setPerfectCount(0);
    setActiveLesson(null); setLessonDone(false);
    setTab("home");
    const g = GRADES.find(g => g.id === id);
    setToast({ icon: g.emoji, text: `เลือกระดับ ${g.full} แล้ว!` });
    setTimeout(() => setToast(null), 2500);
  }, [gradeId]);

  /* quiz */
  const startLesson = (lesson) => {
    setActiveLesson(lesson); setQIndex(0); setSelected(null);
    setLessonScore(0); setLessonDone(false); setAnswered(false); setPassageOpen(false);
    setTab("lessons");
  };
  const submitAnswer = (i) => {
    if (answered) return;
    setSelected(i); setAnswered(true);
    if (i === activeLesson.questions[qIndex].answer) setLessonScore(s => s + 1);
  };
  const nextQuestion = () => {
    if (qIndex + 1 < activeLesson.questions.length) {
      setQIndex(q => q + 1); setSelected(null); setAnswered(false); setPassageOpen(false);
    } else {
      const total = activeLesson.questions.length;
      const trueScore = lessonScore;
      const earned = Math.round((trueScore / total) * activeLesson.xp);
      setXp(x => x + earned);
      setScores(s => ({ ...s, [activeLesson.id]: Math.max(s[activeLesson.id] || 0, Math.round((trueScore / total) * 100)) }));
      if (!completed.includes(activeLesson.id)) setCompleted(c => [...c, activeLesson.id]);
      if (trueScore === total) setPerfectCount(p => p + 1);
      setLessonDone(true);
    }
  };

  /* dialect */
  const changeDialect = (key) => {
    setDialect(key);
    setMessages(m => [...m, { from:"bot", text:DIALECTS[key].greeting }]);
  };

  /* bot */
  const botRespond = useCallback((userText) => {
    const d = DIALECTS[dialect];
    const t = userText.toLowerCase().trim();
    const diff = grade ? grade.diff : 1;

    if (pending) {
      const ok = pending.accept
        ? pending.accept.some(a => t.includes(a))
        : t.replace(/[^0-9]/g,"") === pending.answer;
      if (ok) {
        setPending(null); setXp(x => x + 5);
        return `${d.correct[Math.floor(Math.random()*d.correct.length)]} คำตอบคือ "${pending.answer}" (+5 XP ✨)\n\nอยากลองอีกไหม? พิมพ์ "คณิต" หรือ "อ่าน" ได้เลยจ้า`;
      }
      if (t.includes("ใบ้") || t.includes("ไม่รู้") || t.includes("ช่วย")) {
        return `ครูใบ้ให้นะ 💡 ${pending.hint}\n\n${d.ask}`;
      }
      return `${d.wrong[Math.floor(Math.random()*d.wrong.length)]}\n(พิมพ์ "ใบ้" ถ้าต้องการคำใบ้นะจ๊ะ)`;
    }
    if (t.includes("คณิต") || t.includes("เลข") || t.includes("บวก") || t.includes("ลบ") || t.includes("คูณ") || t.includes("หาร")) {
      const p = genMathProblem(diff); setPending(p);
      return `ได้เลยจ้า! ลองโจทย์ระดับ ${grade?.label || ""} นี้กัน 🔢\n\n"${p.text}"\n\n${d.ask}`;
    }
    if (t.includes("อ่าน") || t.includes("นิทาน") || t.includes("เรื่อง") || t.includes("บทความ")) {
      const pool = getReadChat(diff);
      const r = pool[Math.floor(Math.random()*pool.length)]; setPending(r);
      return `มาฝึกอ่านกันจ้า 📖\n\n"${r.passage}"\n\nคำถาม: ${r.q}\n${d.ask}`;
    }
    if (t.includes("สวัสดี") || t.includes("หวัดดี") || t.includes("สบายดี")) return d.greeting;
    if (t.includes("ขอบคุณ") || t.includes("ขอบใจ")) return "ยินดีจ้า ตั้งใจเรียนแบบนี้ ครูภูมิใจมากเลย 💕";
    if (t.includes("เหนื่อย") || t.includes("ยาก") || t.includes("ท้อ")) return "ไม่เป็นไรนะ การเรียนรู้ต้องใช้เวลา ค่อย ๆ ไปทีละขั้น ครูอยู่ตรงนี้เสมอจ้า 💪💕";
    if (t.includes("ระดับ") || t.includes("ชั้น") || t.includes("เปลี่ยน")) return `ตอนนี้หนูเรียนระดับ ${grade?.full || "?"} อยู่นะจ๊ะ ถ้าอยากเปลี่ยนไปแท็บ "รายงาน" แล้วกด "เปลี่ยนระดับ" ได้เลย`;
    return `ครูช่วยได้นะจ๊ะ ✨\n\n📖 พิมพ์ "อ่าน" — ฝึกอ่านระดับ ${grade?.label || ""}\n🔢 พิมพ์ "คณิต" — โจทย์คณิตระดับ ${grade?.label || ""}\n\nหรือเข้าแท็บ "บทเรียน" เพื่อเก็บ XP ได้เลยจ้า`;
  }, [dialect, pending, grade]);

  const send = useCallback((textOverride) => {
    const text = (textOverride ?? input).trim();
    if (!text) return;
    setMessages(m => [...m, { from:"user", text }]);
    setInput(""); setTyping(true); setChatCount(c => c + 1);
    setTimeout(() => {
      setMessages(m => [...m, { from:"bot", text:botRespond(text) }]);
      setTyping(false);
    }, 700 + Math.random() * 500);
  }, [input, botRespond]);

  /* ── if no grade selected ── */
  if (!gradeId) return <GradePicker onSelect={handleSelectGrade} />;

  const navItems = [
    { id:"home",    icon:"🏠", label:"หน้าหลัก" },
    { id:"lessons", icon:"📚", label:"บทเรียน"  },
    { id:"chat",    icon:"💬", label:"ครู AI"    },
    { id:"report",  icon:"📊", label:"รายงาน"   },
  ];

  const diffBadge = (d) => {
    if(d<=2) return { label:"ง่าย", color:"#22c55e", bg:"#f0fdf4" };
    if(d<=4) return { label:"ปานกลาง", color:"#f59e0b", bg:"#fffbeb" };
    if(d<=6) return { label:"ยาก", color:"#ef4444", bg:"#fef2f2" };
    return { label:"ยากมาก", color:"#7c3aed", bg:"#f5f3ff" };
  };
  const db = diffBadge(grade.diff);

  return (
    <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column" }}>

      {/* Toast */}
      {toast && (
        <div className="toast">
          <span style={{ fontSize:"1.4rem" }}>{toast.icon}</span>
          <span style={{ fontWeight:800, color:"#d97706", fontSize:".85rem" }}>{toast.text}</span>
        </div>
      )}

      {/* Header */}
      <header style={{ background:"linear-gradient(90deg,#4f46e5,#7c3aed,#9333ea)", color:"white", padding:"1rem 1.25rem", boxShadow:"0 4px 24px rgba(79,70,229,.3)" }}>
        <div style={{ maxWidth:896, margin:"0 auto", display:"flex", alignItems:"center", justifyContent:"space-between", gap:12 }}>
          <div style={{ display:"flex", alignItems:"center", gap:12 }}>
            <div style={{ width:46, height:46, background:"white", borderRadius:16, display:"flex", alignItems:"center", justifyContent:"center", fontSize:"1.5rem", transform:"rotate(3deg)" }}>🤖</div>
            <div>
              <h1 style={{ fontSize:"1.05rem", fontWeight:900 }}>ครู AI ประจำตัว</h1>
              <div style={{ display:"flex", alignItems:"center", gap:6, marginTop:2 }}>
                <span style={{ fontSize:"1rem" }}>{grade.emoji}</span>
                <span style={{ fontSize:".7rem", color:"#c7d2fe", fontWeight:700 }}>{grade.full}</span>
                <span style={{ fontSize:".65rem", background:db.bg, color:db.color, fontWeight:800, padding:".1rem .45rem", borderRadius:999 }}>{db.label}</span>
              </div>
            </div>
          </div>
          <div style={{ textAlign:"right" }}>
            <div style={{ display:"flex", alignItems:"center", gap:8, justifyContent:"flex-end" }}>
              <span style={{ background:"#fbbf24", color:"#92400e", fontSize:".7rem", fontWeight:900, padding:".25rem .75rem", borderRadius:999 }}>Lv.{level}</span>
              <span style={{ fontSize:".75rem", fontWeight:700, color:"#e0e7ff" }}>{xp} XP</span>
            </div>
            <div style={{ width:112, height:8, background:"#312e81", borderRadius:999, marginTop:6, overflow:"hidden" }}>
              <div className="progress-bar" style={{ height:"100%", borderRadius:999, background:"linear-gradient(90deg,#fde68a,#fbbf24)", width:`${xpInLevel}%` }} />
            </div>
          </div>
        </div>
      </header>

      {/* Nav */}
      <nav style={{ background:"white", boxShadow:"0 2px 12px rgba(0,0,0,.08)", position:"sticky", top:0, zIndex:20 }}>
        <div style={{ maxWidth:896, margin:"0 auto", display:"grid", gridTemplateColumns:"repeat(4,1fr)" }}>
          {navItems.map(t => (
            <button key={t.id} onClick={() => { setTab(t.id); setActiveLesson(null); }}
              style={{ padding:".75rem .25rem", fontSize:".7rem", fontWeight:800, display:"flex", flexDirection:"column", alignItems:"center", gap:2, borderBottom:`4px solid ${tab===t.id?"#7c3aed":"transparent"}`, color:tab===t.id?"#6d28d9":"#9ca3af", background:tab===t.id?"#f5f3ff":"transparent", transition:"all .2s" }}>
              <span style={{ fontSize:"1.15rem" }}>{t.icon}</span>
              <span>{t.label}</span>
            </button>
          ))}
        </div>
      </nav>

      <main style={{ maxWidth:896, margin:"0 auto", width:"100%", flex:1, padding:"1rem" }}>

        {/* ══════ HOME ══════ */}
        {tab === "home" && (
          <div className="fade-up" style={{ display:"flex", flexDirection:"column", gap:16 }}>

            {/* Hero */}
            <div style={{ background:"linear-gradient(135deg,#4f46e5,#7c3aed)", borderRadius:28, padding:"1.75rem", color:"white", boxShadow:"0 8px 32px rgba(79,70,229,.35)", position:"relative", overflow:"hidden" }}>
              <div style={{ position:"absolute", right:-20, top:-20, width:130, height:130, background:"rgba(255,255,255,.1)", borderRadius:"50%" }} />
              <p style={{ color:"#c7d2fe", fontSize:".8rem", fontWeight:600 }}>สวัสดี ☀️</p>
              <h2 style={{ fontSize:"1.75rem", fontWeight:900, marginTop:4 }}>น้องนักเรียน</h2>
              <div style={{ display:"flex", alignItems:"center", gap:8, marginTop:4 }}>
                <span style={{ fontSize:".85rem" }}>{grade.emoji}</span>
                <span style={{ color:"#c7d2fe", fontSize:".82rem" }}>{grade.full}</span>
                <span style={{ fontSize:".7rem", background:"rgba(255,255,255,.2)", padding:".15rem .5rem", borderRadius:999, fontWeight:700 }}>{db.label}</span>
              </div>
              <div style={{ display:"flex", gap:10, marginTop:18, flexWrap:"wrap" }}>
                <button className="btn-h" onClick={() => setTab("lessons")} style={{ background:"white", color:"#5b21b6", fontWeight:900, padding:".6rem 1.25rem", borderRadius:18, fontSize:".85rem", boxShadow:"0 4px 16px rgba(0,0,0,.15)" }}>📚 ทำบทเรียน</button>
                <button className="btn-h" onClick={() => setTab("chat")} style={{ background:"rgba(124,58,237,.6)", color:"white", fontWeight:900, padding:".6rem 1.25rem", borderRadius:18, fontSize:".85rem", border:"1px solid rgba(167,139,250,.5)" }}>💬 คุยกับครู</button>
              </div>
            </div>

            {/* Progress */}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>
              {[
                { icon:"📖", label:"การอ่าน", val:readingProg, accent:"#f97316", bg:"#fff7ed", border:"#fed7aa", barFrom:"#fb923c", barTo:"#f43f5e" },
                { icon:"🔢", label:"คณิตศาสตร์", val:mathProg, accent:"#3b82f6", bg:"#eff6ff", border:"#bfdbfe", barFrom:"#38bdf8", barTo:"#6366f1" },
              ].map(s => (
                <div key={s.label} style={{ background:s.bg, borderRadius:24, padding:"1.25rem", border:`2px solid ${s.border}` }}>
                  <div style={{ display:"flex", justifyContent:"space-between" }}>
                    <span style={{ fontSize:"2rem" }}>{s.icon}</span>
                    <span style={{ fontSize:"1.5rem", fontWeight:900, color:s.accent }}>{s.val}%</span>
                  </div>
                  <p style={{ fontSize:".8rem", fontWeight:800, color:"#374151", marginTop:8 }}>{s.label}</p>
                  <div style={{ marginTop:8, height:10, background:"white", borderRadius:999, overflow:"hidden" }}>
                    <div className="progress-bar" style={{ height:"100%", borderRadius:999, background:`linear-gradient(90deg,${s.barFrom},${s.barTo})`, width:`${s.val}%` }} />
                  </div>
                </div>
              ))}
            </div>

            {/* Badges mini */}
            <div style={{ background:"white", borderRadius:24, padding:"1.25rem", border:"1px solid #f3f4f6" }}>
              <h3 style={{ fontWeight:900, color:"#1f2937", marginBottom:12 }}>🏅 เหรียญรางวัล</h3>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:8 }}>
                {BADGES.map(b => {
                  const got = earnedBadges.includes(b.id);
                  return (
                    <div key={b.id} style={{ borderRadius:16, padding:"10px 6px", textAlign:"center", background:got?"#fffbeb":"#f9fafb", border:`2px solid ${got?"#fcd34d":"#e5e7eb"}`, opacity:got?1:.45, transition:"all .3s" }}>
                      <div style={{ fontSize:"1.5rem", filter:got?"none":"grayscale(1)" }}>{b.icon}</div>
                      <p style={{ fontSize:".62rem", fontWeight:800, marginTop:3, color:"#374151" }}>{b.name}</p>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Tip */}
            <div style={{ background:"linear-gradient(135deg,#fffbeb,#fff7ed)", border:"2px solid #fcd34d", borderRadius:24, padding:"1rem 1.25rem", display:"flex", gap:12, alignItems:"flex-start" }}>
              <span style={{ fontSize:"1.5rem" }}>💡</span>
              <div style={{ fontSize:".82rem", color:"#92400e" }}>
                <b>ครูแนะนำสำหรับ {grade.label}:</b>{" "}
                {mathProg < readingProg ? `คณิตศาสตร์ยังตามหลังอยู่ ลองทำโจทย์คณิต${grade.label}ดูนะ` : completed.length < 2 ? `เริ่มทำบทเรียนแรกเพื่อเก็บ XP ได้เลยจ้า` : `ทำได้ดีมาก! ลองบทเรียนที่ยังไม่เต็ม 100% นะจ๊ะ`}
              </div>
            </div>
          </div>
        )}

        {/* ══════ LESSONS LIST ══════ */}
        {tab === "lessons" && !activeLesson && (
          <div className="fade-up" style={{ display:"flex", flexDirection:"column", gap:16 }}>
            <div style={{ background:"white", borderRadius:24, padding:"1rem 1.25rem", fontSize:".82rem", color:"#6b7280", border:"1px solid #f3f4f6", display:"flex", alignItems:"center", gap:10 }}>
              <span style={{ fontSize:"1.4rem" }}>{grade.emoji}</span>
              <span>บทเรียนระดับ <b style={{ color:grade.color }}>{grade.full}</b> — ทำจบรับ XP ทันที!</span>
              <span style={{ marginLeft:"auto", fontSize:".7rem", background:db.bg, color:db.color, fontWeight:800, padding:".2rem .6rem", borderRadius:999 }}>{db.label}</span>
            </div>

            {[
              { name:"📖 การอ่าน", list:readingLessons, color:"#ea580c" },
              { name:"🔢 คณิตศาสตร์", list:mathLessons, color:"#2563eb" },
            ].map(g => (
              <div key={g.name}>
                <h3 style={{ fontWeight:900, color:g.color, marginBottom:10, paddingLeft:4 }}>{g.name}</h3>
                <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
                  {g.list.map(l => {
                    const score = scores[l.id];
                    const done  = completed.includes(l.id);
                    return (
                      <button key={l.id} onClick={() => startLesson(l)} className="btn-h"
                        style={{ background:"white", borderRadius:24, padding:"1.25rem", display:"flex", alignItems:"center", gap:16, boxShadow:"0 2px 12px rgba(0,0,0,.06)", border:"1px solid #f3f4f6", textAlign:"left", width:"100%" }}>
                        <div style={{ width:56, height:56, flexShrink:0, background:"linear-gradient(135deg,#ede9fe,#dbeafe)", borderRadius:18, display:"flex", alignItems:"center", justifyContent:"center", fontSize:"1.75rem" }}>{l.icon}</div>
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
                            <h3 style={{ fontWeight:900, color:"#1f2937", fontSize:".95rem" }}>{l.title}</h3>
                            {done && <span>✅</span>}
                          </div>
                          <p style={{ fontSize:".75rem", color:"#9ca3af", marginTop:2 }}>{l.desc}</p>
                          <div style={{ display:"flex", gap:6, marginTop:8, flexWrap:"wrap" }}>
                            <span style={{ fontSize:".7rem", background:"#fffbeb", color:"#b45309", fontWeight:800, padding:".2rem .6rem", borderRadius:999 }}>+{l.xp} XP</span>
                            {score !== undefined && <span style={{ fontSize:".7rem", background:"#f0fdf4", color:"#15803d", fontWeight:800, padding:".2rem .6rem", borderRadius:999 }}>คะแนนดีสุด {score}%</span>}
                            <span style={{ fontSize:".7rem", background:db.bg, color:db.color, fontWeight:800, padding:".2rem .6rem", borderRadius:999 }}>{db.label}</span>
                          </div>
                        </div>
                        <span style={{ color:"#a78bfa", fontWeight:900, fontSize:"1.25rem" }}>›</span>
                      </button>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        )}

        {/* ══════ QUIZ ══════ */}
        {tab === "lessons" && activeLesson && !lessonDone && (
          <div className="fade-up" style={{ background:"white", borderRadius:28, boxShadow:"0 8px 32px rgba(0,0,0,.1)", padding:"1.5rem", border:"1px solid #f3f4f6" }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
              <button onClick={() => setActiveLesson(null)} style={{ fontSize:".82rem", color:"#9ca3af", fontWeight:800 }}>‹ กลับ</button>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <span style={{ fontSize:".65rem", background:db.bg, color:db.color, fontWeight:800, padding:".2rem .5rem", borderRadius:999 }}>{grade.label} · {db.label}</span>
                <span style={{ fontSize:".75rem", fontWeight:900, color:"#7c3aed", background:"#f5f3ff", padding:".3rem .9rem", borderRadius:999 }}>ข้อ {qIndex+1}/{activeLesson.questions.length}</span>
              </div>
            </div>

            <div style={{ height:8, background:"#f3f4f6", borderRadius:999, marginBottom:20, overflow:"hidden" }}>
              <div className="progress-bar" style={{ height:"100%", borderRadius:999, background:"linear-gradient(90deg,#8b5cf6,#6366f1)", width:`${((qIndex+(answered?1:0))/activeLesson.questions.length)*100}%` }} />
            </div>

            {activeLesson.passage && qIndex===0 && !answered && (
              <div style={{ background:"#fff7ed", border:"2px solid #fed7aa", borderRadius:20, padding:"1rem", marginBottom:16, fontSize:".85rem", color:"#374151", lineHeight:1.9 }}>
                <p style={{ fontWeight:900, color:"#ea580c", marginBottom:6 }}>📖 อ่านเรื่องนี้ก่อนนะ</p>
                <div style={{ whiteSpace:"pre-line" }}>{activeLesson.passage}</div>
              </div>
            )}
            {activeLesson.passage && (qIndex>0 || answered) && (
              <div style={{ marginBottom:16 }}>
                <button onClick={() => setPassageOpen(o=>!o)} style={{ fontSize:".78rem", fontWeight:800, color:"#f97316", display:"flex", alignItems:"center", gap:4 }}>
                  {passageOpen?"▾":"▸"} 📖 อ่านเรื่องอีกครั้ง
                </button>
                {passageOpen && <div style={{ background:"#fff7ed", borderRadius:16, padding:".75rem", marginTop:8, fontSize:".82rem", color:"#374151", lineHeight:1.9, whiteSpace:"pre-line" }}>{activeLesson.passage}</div>}
              </div>
            )}

            <div style={{ background:"linear-gradient(135deg,#f5f3ff,#ede9fe)", borderRadius:20, padding:"1.25rem", marginBottom:20 }}>
              <p style={{ fontWeight:800, color:"#4c1d95", fontSize:"1rem", lineHeight:1.65 }}>{activeLesson.questions[qIndex].q}</p>
            </div>

            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              {activeLesson.questions[qIndex].choices.map((c, i) => {
                const isCorrect = i === activeLesson.questions[qIndex].answer;
                const isSelected = i === selected;
                let bg="white", border="2px solid #e5e7eb", color="#374151";
                if (answered) {
                  if (isCorrect)               { bg="#f0fdf4"; border="2px solid #86efac"; color="#166534"; }
                  else if (isSelected)         { bg="#fef2f2"; border="2px solid #fca5a5"; color="#991b1b"; }
                }
                return (
                  <button key={i} disabled={answered} onClick={() => submitAnswer(i)} className="choice-btn"
                    style={{ background:bg, border, borderRadius:16, padding:".85rem 1rem", textAlign:"left", display:"flex", alignItems:"center", gap:12, fontSize:".88rem", fontWeight:700, color, cursor:answered?"default":"pointer" }}>
                    <span style={{ width:28, height:28, borderRadius:"50%", flexShrink:0, background:answered&&isCorrect?"#86efac":answered&&isSelected?"#fca5a5":"#f3f4f6", display:"flex", alignItems:"center", justifyContent:"center", fontSize:".75rem", fontWeight:900 }}>
                      {answered&&isCorrect?"✓":answered&&isSelected&&!isCorrect?"✗":["ก","ข","ค","ง"][i]}
                    </span>
                    {c}
                  </button>
                );
              })}
            </div>

            {answered && (
              <div style={{ marginTop:16 }}>
                <div style={{ background:selected===activeLesson.questions[qIndex].answer?"#f0fdf4":"#fef2f2", border:`2px solid ${selected===activeLesson.questions[qIndex].answer?"#86efac":"#fca5a5"}`, borderRadius:16, padding:".9rem 1rem", fontSize:".85rem", color:selected===activeLesson.questions[qIndex].answer?"#166534":"#991b1b", fontWeight:700, marginBottom:12 }}>
                  {selected===activeLesson.questions[qIndex].answer ? "🎉 ถูกต้องมาก! เก่งมากเลย" : `❌ ยังไม่ถูกนะ คำตอบที่ถูกคือ "${activeLesson.questions[qIndex].choices[activeLesson.questions[qIndex].answer]}"`}
                </div>
                <button onClick={nextQuestion} className="btn-h" style={{ width:"100%", background:"linear-gradient(90deg,#7c3aed,#6366f1)", color:"white", fontWeight:900, padding:".9rem", borderRadius:18, fontSize:".9rem", boxShadow:"0 4px 16px rgba(124,58,237,.35)" }}>
                  {qIndex+1<activeLesson.questions.length?"ข้อถัดไป →":"ดูผลลัพธ์ 🎊"}
                </button>
              </div>
            )}
          </div>
        )}

        {/* ══════ LESSON DONE ══════ */}
        {tab === "lessons" && activeLesson && lessonDone && (
          <div className="fade-up" style={{ background:"white", borderRadius:28, boxShadow:"0 8px 32px rgba(0,0,0,.1)", padding:"2rem 1.5rem", textAlign:"center", border:"1px solid #f3f4f6" }}>
            <div className="star-pop" style={{ fontSize:"4rem", marginBottom:8 }}>
              {lessonScore===activeLesson.questions.length?"🏆":lessonScore>=activeLesson.questions.length/2?"⭐":"📝"}
            </div>
            <h2 style={{ fontSize:"1.4rem", fontWeight:900, color:"#1f2937" }}>
              {lessonScore===activeLesson.questions.length?"สุดยอด! เต็มร้อย! 🎉":"ทำเสร็จแล้ว! 🌟"}
            </h2>
            <p style={{ color:"#6b7280", fontSize:".88rem", marginTop:6 }}>ตอบถูก {lessonScore}/{activeLesson.questions.length} ข้อ · ระดับ {grade.label}</p>
            <div style={{ background:"linear-gradient(135deg,#f5f3ff,#ede9fe)", borderRadius:20, padding:"1rem", margin:"1.25rem auto", display:"inline-block", minWidth:160 }}>
              <p style={{ fontSize:".8rem", color:"#7c3aed", fontWeight:700 }}>XP ที่ได้รับ</p>
              <p style={{ fontSize:"2rem", fontWeight:900, color:"#6d28d9" }}>+{Math.round((lessonScore/activeLesson.questions.length)*activeLesson.xp)}</p>
            </div>
            <div style={{ display:"flex", gap:10, justifyContent:"center", flexWrap:"wrap" }}>
              <button onClick={() => startLesson(activeLesson)} className="btn-h" style={{ background:"#f5f3ff", color:"#6d28d9", fontWeight:900, padding:".7rem 1.5rem", borderRadius:18, fontSize:".85rem", border:"2px solid #ddd6fe" }}>🔄 ทำใหม่</button>
              <button onClick={() => setActiveLesson(null)} className="btn-h" style={{ background:"linear-gradient(90deg,#7c3aed,#6366f1)", color:"white", fontWeight:900, padding:".7rem 1.5rem", borderRadius:18, fontSize:".85rem", boxShadow:"0 4px 16px rgba(124,58,237,.3)" }}>📚 บทเรียนถัดไป →</button>
            </div>
          </div>
        )}

        {/* ══════ CHAT ══════ */}
        {tab === "chat" && (
          <div className="fade-in" style={{ background:"white", borderRadius:28, boxShadow:"0 8px 32px rgba(0,0,0,.1)", display:"flex", flexDirection:"column", height:"72vh", border:"1px solid #f3f4f6", overflow:"hidden" }}>
            <div style={{ padding:".85rem 1rem", borderBottom:"1px solid #f3f4f6", display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:8 }}>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <div style={{ width:38, height:38, background:"#ede9fe", borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", fontSize:"1.25rem" }}>🤖</div>
                <div>
                  <p style={{ fontWeight:900, fontSize:".88rem", color:"#1f2937" }}>ครู AI</p>
                  <p style={{ fontSize:".7rem", color:"#22c55e" }}>● ออนไลน์ · ระดับ {grade.label}</p>
                </div>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:5, flexWrap:"wrap" }}>
                <span style={{ fontSize:".7rem", color:"#9ca3af" }}>ภาษา:</span>
                {Object.entries(DIALECTS).map(([key, d]) => (
                  <button key={key} onClick={() => changeDialect(key)} style={{ fontSize:".7rem", padding:".25rem .6rem", borderRadius:999, fontWeight:700, background:dialect===key?"#6d28d9":"#f3f4f6", color:dialect===key?"white":"#6b7280", transition:"all .2s" }}>{d.flagEmoji}{d.name}</button>
                ))}
              </div>
            </div>

            <div style={{ flex:1, overflowY:"auto", padding:"1rem", display:"flex", flexDirection:"column", gap:10, background:"#f5f3ff" }}>
              {messages.map((m, i) => (
                <div key={i} style={{ display:"flex", justifyContent:m.from==="user"?"flex-end":"flex-start" }}>
                  <div style={{ maxWidth:"75%", padding:".7rem 1rem", borderRadius:20, fontSize:".85rem", lineHeight:1.75, whiteSpace:"pre-line", boxShadow:"0 2px 8px rgba(0,0,0,.08)", background:m.from==="user"?"linear-gradient(135deg,#6d28d9,#5b21b6)":"white", color:m.from==="user"?"white":"#374151", borderBottomRightRadius:m.from==="user"?4:20, borderBottomLeftRadius:m.from==="bot"?4:20 }}>
                    {m.text}
                  </div>
                </div>
              ))}
              {typing && (
                <div style={{ display:"flex" }}>
                  <div style={{ background:"white", padding:".7rem 1rem", borderRadius:20, borderBottomLeftRadius:4, boxShadow:"0 2px 8px rgba(0,0,0,.08)", display:"flex", gap:4, alignItems:"center" }}>
                    <span className="dot1" style={{ width:7, height:7, background:"#a78bfa", borderRadius:"50%", display:"inline-block" }} />
                    <span className="dot2" style={{ width:7, height:7, background:"#a78bfa", borderRadius:"50%", display:"inline-block" }} />
                    <span className="dot3" style={{ width:7, height:7, background:"#a78bfa", borderRadius:"50%", display:"inline-block" }} />
                  </div>
                </div>
              )}
              <div ref={bottomRef} />
            </div>

            <div style={{ padding:".75rem 1rem", borderTop:"1px solid #f3f4f6" }}>
              <div style={{ display:"flex", gap:6, marginBottom:8, flexWrap:"wrap" }}>
                {["อยากฝึกอ่าน 📖","อยากฝึกคณิต 🔢","สวัสดีครู 👋","ขอคำใบ้ 💡"].map(s => (
                  <button key={s} onClick={() => send(s)} style={{ fontSize:".7rem", background:"#ede9fe", color:"#6d28d9", padding:".3rem .75rem", borderRadius:999, fontWeight:700 }}>{s}</button>
                ))}
              </div>
              <div style={{ display:"flex", gap:8 }}>
                <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="พิมพ์ข้อความถึงครู AI..." style={{ flex:1, border:"2px solid #e5e7eb", borderRadius:999, padding:".6rem 1.1rem", fontSize:".85rem", outline:"none", transition:"border .2s" }} onFocus={e=>e.target.style.borderColor="#a78bfa"} onBlur={e=>e.target.style.borderColor="#e5e7eb"} />
                <button onClick={()=>send()} className="btn-h" style={{ background:"linear-gradient(135deg,#7c3aed,#6366f1)", color:"white", padding:".6rem 1.4rem", borderRadius:999, fontSize:".85rem", fontWeight:900, boxShadow:"0 4px 16px rgba(124,58,237,.35)" }}>ส่ง</button>
              </div>
            </div>
          </div>
        )}

        {/* ══════ REPORT ══════ */}
        {tab === "report" && (
          <div className="fade-up" style={{ display:"flex", flexDirection:"column", gap:16 }}>

            {/* XP Hero */}
            <div style={{ background:"linear-gradient(135deg,#4f46e5,#7c3aed)", borderRadius:28, padding:"1.5rem", color:"white", boxShadow:"0 8px 32px rgba(79,70,229,.3)" }}>
              <p style={{ color:"#c7d2fe", fontSize:".8rem", fontWeight:600 }}>ภาพรวมความก้าวหน้า</p>
              <div style={{ display:"flex", alignItems:"baseline", gap:8, marginTop:8 }}>
                <span style={{ fontSize:"2.5rem", fontWeight:900 }}>{xp}</span>
                <span style={{ fontSize:".85rem", color:"#c7d2fe" }}>XP รวม · เลเวล {level}</span>
              </div>
              <div style={{ height:10, background:"rgba(255,255,255,.2)", borderRadius:999, marginTop:12, overflow:"hidden" }}>
                <div className="progress-bar" style={{ height:"100%", borderRadius:999, background:"linear-gradient(90deg,#fde68a,#fbbf24)", width:`${xpInLevel}%` }} />
              </div>
              <p style={{ fontSize:".75rem", color:"#c7d2fe", marginTop:6 }}>{xpInLevel}/100 XP ไปเลเวล {level+1}</p>
            </div>

            {/* Grade change */}
            <div style={{ background:"white", borderRadius:24, padding:"1.25rem", border:"1px solid #f3f4f6" }}>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:10 }}>
                <div>
                  <p style={{ fontWeight:900, fontSize:".9rem", color:"#1f2937" }}>ระดับชั้นปัจจุบัน</p>
                  <div style={{ display:"flex", alignItems:"center", gap:8, marginTop:6 }}>
                    <span style={{ fontSize:"1.5rem" }}>{grade.emoji}</span>
                    <span style={{ fontWeight:900, color:grade.color, fontSize:"1rem" }}>{grade.full}</span>
                    <span style={{ fontSize:".72rem", background:db.bg, color:db.color, fontWeight:800, padding:".2rem .6rem", borderRadius:999 }}>{db.label}</span>
                  </div>
                </div>
                <button onClick={() => setGradeId(null)} className="btn-h" style={{ background:"linear-gradient(90deg,#7c3aed,#6366f1)", color:"white", fontWeight:900, padding:".6rem 1.25rem", borderRadius:18, fontSize:".82rem", boxShadow:"0 4px 14px rgba(124,58,237,.3)" }}>
                  🎓 เปลี่ยนระดับชั้น
                </button>
              </div>

              {/* All grades mini picker */}
              <div style={{ marginTop:14 }}>
                <p style={{ fontSize:".75rem", color:"#9ca3af", fontWeight:700, marginBottom:8 }}>เปลี่ยนด่วน:</p>
                <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                  {GRADES.map(g => (
                    <button key={g.id} onClick={() => handleSelectGrade(g.id)} style={{ fontSize:".78rem", fontWeight:800, padding:".35rem .8rem", borderRadius:999, background:gradeId===g.id?g.bg:"#f9fafb", color:gradeId===g.id?g.color:"#9ca3af", border:`2px solid ${gradeId===g.id?g.border:"#e5e7eb"}`, transition:"all .2s" }}>
                      {g.emoji} {g.label}
                    </button>
                  ))}
                </div>
              </div>
            </div>

            {/* Stats */}
            <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:12 }}>
              {[
                { icon:"✅", label:"บทเรียนจบ", val:completed.length, color:"#22c55e" },
                { icon:"💯", label:"คะแนนเต็ม", val:perfectCount, color:"#f59e0b" },
                { icon:"💬", label:"ข้อความ",   val:chatCount,    color:"#6366f1" },
              ].map(s => (
                <div key={s.label} style={{ background:"white", borderRadius:20, padding:"1rem", textAlign:"center", boxShadow:"0 2px 12px rgba(0,0,0,.06)", border:"1px solid #f3f4f6" }}>
                  <div style={{ fontSize:"1.5rem" }}>{s.icon}</div>
                  <div style={{ fontSize:"1.5rem", fontWeight:900, color:s.color, marginTop:4 }}>{s.val}</div>
                  <div style={{ fontSize:".7rem", color:"#9ca3af", fontWeight:700 }}>{s.label}</div>
                </div>
              ))}
            </div>

            {/* Subject breakdown */}
            <div style={{ background:"white", borderRadius:24, padding:"1.25rem", border:"1px solid #f3f4f6" }}>
              <h3 style={{ fontWeight:900, color:"#1f2937", marginBottom:14 }}>📊 รายงานรายวิชา · {grade.label}</h3>
              {[
                { label:"การอ่าน", lessons:readingLessons, barFrom:"#fb923c", barTo:"#f43f5e" },
                { label:"คณิตศาสตร์", lessons:mathLessons, barFrom:"#38bdf8", barTo:"#6366f1" },
              ].map(g => (
                <div key={g.label} style={{ marginBottom:18 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
                    <span style={{ fontWeight:800, fontSize:".85rem", color:"#374151" }}>{g.label}</span>
                    <span style={{ fontWeight:900, fontSize:".85rem", color:"#6d28d9" }}>{subjectProgress(g.lessons, scores)}%</span>
                  </div>
                  <div style={{ height:10, background:"#f3f4f6", borderRadius:999, overflow:"hidden" }}>
                    <div className="progress-bar" style={{ height:"100%", borderRadius:999, background:`linear-gradient(90deg,${g.barFrom},${g.barTo})`, width:`${subjectProgress(g.lessons,scores)}%` }} />
                  </div>
                  <div style={{ display:"flex", gap:7, marginTop:10, flexWrap:"wrap" }}>
                    {g.lessons.map(l => {
                      const s = scores[l.id];
                      const done = completed.includes(l.id);
                      return (
                        <div key={l.id} style={{ fontSize:".72rem", fontWeight:700, padding:".3rem .75rem", borderRadius:999, background:done?"#f0fdf4":"#f9fafb", color:done?"#15803d":"#9ca3af", border:`1px solid ${done?"#86efac":"#e5e7eb"}` }}>
                          {l.icon} {l.title.slice(0,12)}{l.title.length>12?"…":""} {s!==undefined?`(${s}%)`:""}
                        </div>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>

            {/* Badges full */}
            <div style={{ background:"white", borderRadius:24, padding:"1.25rem", border:"1px solid #f3f4f6" }}>
              <h3 style={{ fontWeight:900, color:"#1f2937", marginBottom:12 }}>🏅 เหรียญรางวัล ({earnedBadges.length}/{BADGES.length})</h3>
              <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                {BADGES.map(b => {
                  const got = earnedBadges.includes(b.id);
                  return (
                    <div key={b.id} style={{ display:"flex", alignItems:"center", gap:12, padding:".8rem 1rem", borderRadius:16, background:got?"#fffbeb":"#f9fafb", border:`2px solid ${got?"#fcd34d":"#e5e7eb"}`, opacity:got?1:.6 }}>
                      <span style={{ fontSize:"1.5rem", filter:got?"none":"grayscale(1)" }}>{b.icon}</span>
                      <div style={{ flex:1 }}>
                        <p style={{ fontWeight:800, fontSize:".85rem", color:"#1f2937" }}>{b.name}</p>
                        <p style={{ fontSize:".72rem", color:"#9ca3af" }}>{b.desc}</p>
                      </div>
                      {got && <span style={{ fontSize:".7rem", color:"#d97706", fontWeight:800, background:"#fef9c3", padding:".2rem .6rem", borderRadius:999 }}>ได้แล้ว!</span>}
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}
      </main>

      <footer style={{ textAlign:"center", fontSize:".7rem", color:"#9ca3af", padding:".75rem", marginTop:8 }}>
        ครู AI ประจำตัว · {grade.full} 🇹🇭
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
